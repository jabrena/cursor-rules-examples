spring.application.name=greek-gods-rest-client

# --- Upstream Greek Gods HTTP API (RestClient appends path /greek) ---
greek-gods.api.base-url=https://my-json-server.typicode.com/jabrena/latency-problems
greek-gods.api.connect-timeout=5s
greek-gods.api.read-timeout=10s

# --- Resilience4j (instance name: greekGods) ---
# Rate limiter: burst-friendly throughput cap
resilience4j.ratelimiter.instances.greekGods.limit-for-period=10
resilience4j.ratelimiter.instances.greekGods.limit-refresh-period=1s
resilience4j.ratelimiter.instances.greekGods.timeout-duration=0

# Retry: outer policy (must own fallbackMethod on GreekGodsService — see Javadoc)
resilience4j.retry.instances.greekGods.max-attempts=3
resilience4j.retry.instances.greekGods.wait-duration=500ms
resilience4j.retry.instances.greekGods.enable-exponential-backoff=true
resilience4j.retry.instances.greekGods.exponential-backoff-multiplier=2

# Circuit breaker: sliding window + minimum calls before OPEN transition
resilience4j.circuitbreaker.instances.greekGods.sliding-window-size=10
resilience4j.circuitbreaker.instances.greekGods.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.greekGods.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.greekGods.minimum-number-of-calls=5

# --- Logging (resilience + service troubleshooting) ---
logging.level.io.github.resilience4j=INFO
logging.level.info.jab.ms.service.GreekGodsService=INFO
